# goexpandia.com Language Routing Map
# Current production site is English-only.

routing_configuration:
  base_domain: "https://www.goexpandia.com"
  default_language: "en"
  supported_languages: ["en"]

  language_detection:
    method: "none"
    auto_redirect: false
    fallback_language: "en"

url_mapping:
  homepage:
    en: "/"
    canonical:
      en: "https://www.goexpandia.com/"

  solutions:
    en: "/solutions.html"
    canonical:
      en: "https://www.goexpandia.com/solutions.html"

  about:
    en: "/about.html"
    canonical:
      en: "https://www.goexpandia.com/about.html"

  contact:
    en: "/contact.html"
    canonical:
      en: "https://www.goexpandia.com/contact.html"

  blog:
    en: "/blog/"
    canonical:
      en: "https://www.goexpandia.com/blog/"

seo_settings:
  hreflang_implementation:
    enabled: true
    languages: ["en", "x-default"]
    x_default: "en"

  canonical_urls:
    self_referencing: true
    language_specific: false

  html_lang_attributes:
    en: "lang='en'"

technical_configuration:
  build_system: "node_build_pages_js"
  template_engine: "custom_replacement"
  language_detection_script: "src/js/index.js"

  file_structure:
    english: "/"

  sitemap_entries:
    all_languages_included: false
    only_english_urls: true

legacy_language_paths:
  status: "redirected_to_english"
  prefixes:
    - "/de/"
    - "/fr/"
