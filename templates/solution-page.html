<!-- Solution Hero -->
<section class="section-spacing bg-base-200 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-1/2 h-full opacity-10">
        <svg viewBox="0 0 400 400" class="w-full h-full">
            <circle cx="200" cy="200" r="150" fill="none" stroke="currentColor" stroke-width="1" class="text-primary" />
            <circle cx="200" cy="200" r="100" fill="none" stroke="currentColor" stroke-width="1" class="text-primary" />
            <circle cx="200" cy="200" r="50" fill="none" stroke="currentColor" stroke-width="1" class="text-primary" />
        </svg>
    </div>

    <div class="container mx-auto container-padding">
        <div class="grid lg:grid-cols-2 gap-16 items-center">
            <div class="animate-fade-in">
                <div class="inline-flex items-center gap-2 bg-primary/10 text-primary px-4 py-2 rounded-full text-sm font-bold mb-6">
                    <span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
                    {{HERO_BADGE}}
                </div>
                <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight">
                    <span class="gradient-header">{{HERO_TITLE_PREFIX}}</span><br>
                    <span class="text-base-content">{{HERO_TITLE_SUFFIX}}</span>
                </h1>
                <p class="text-xl md:text-2xl text-base-content/80 mb-8 leading-relaxed">
                    {{HERO_DESCRIPTION}}
                </p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="{{PRIMARY_CTA_LINK}}" class="btn btn-primary btn-lg buzz-button shadow-lg shadow-primary/25">{{PRIMARY_CTA_TEXT}}</a>
                    <a href="{{SECONDARY_CTA_LINK}}" class="btn btn-outline btn-lg">{{SECONDARY_CTA_TEXT}}</a>
                </div>
            </div>
            <div class="relative">
                <img src="{{HERO_IMAGE}}"
                    alt="{{HERO_IMAGE_ALT}}" class="rounded-3xl shadow-2xl w-full object-cover aspect-[4/3]">
            </div>
        </div>
    </div>
</section>
