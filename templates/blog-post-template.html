<!DOCTYPE html>
<html lang="en" data-theme="bumblebee">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BLOG_TITLE}} | Expandia</title>
    <meta name="description" content="{{BLOG_DESCRIPTION}}">
    <link href="../dist/css/output.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <link rel="canonical" href="{{CANONICAL_URL}}">

    <!-- OpenGraph / Twitter for stronger SERP snippets -->
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="Expandia" />
    <meta property="og:title" content="{{BLOG_TITLE}} | Expandia" />
    <meta property="og:description" content="{{BLOG_DESCRIPTION}}" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    <meta property="og:image" content="{{OG_IMAGE}}">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{BLOG_TITLE}} | Expandia" />
    <meta name="twitter:description" content="{{BLOG_DESCRIPTION}}" />
    <meta name="twitter:image" content="{{OG_IMAGE}}" />

    <!-- Article Schema Markup -->
    
</body>
</html>
