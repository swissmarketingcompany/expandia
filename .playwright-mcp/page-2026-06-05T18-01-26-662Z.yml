          - heading "What an AI Website Chatbot Actually Does" [level=2] [ref=e123]
          - paragraph [ref=e124]: An AI website chatbot is a conversational interface that helps visitors get answers or complete simple steps on a website. It may use a knowledge base, page content, scripted flows, forms, basic qualification questions, and simple routing rules. Its job is to make the website easier to use.
          - paragraph [ref=e125]: A good website chatbot can answer questions about services, pricing ranges, product features, delivery areas, appointment options, support policies, content, and next steps. It can ask visitors what they need, recommend pages, collect contact details, and hand off to a form or human team.
          - paragraph [ref=e126]: The best simple bot is narrow and honest. It does not pretend to know private account data. It does not invent pricing. It does not promise timelines. It does not decide whether someone qualifies for a service unless the rules are public and simple. It answers from approved material and makes the next step easier.
          - paragraph [ref=e127]: Many businesses should start here. A useful bot can reduce repetitive questions, improve conversion paths, and show which website content is unclear. It can also generate conversation data that helps the team decide whether an AI agent is worth building later.
          - heading "What an AI Agent Does Differently" [level=2] [ref=e128]
          - paragraph [ref=e129]: An AI agent is a workflow system that can use context, tools, rules, and integrations to complete controlled tasks. It may read the conversation, check the CRM, search internal knowledge, create a ticket, draft a reply, update a record, route a lead, book a meeting, or prepare a handoff packet.
          - paragraph [ref=e130]: The word "agent" should not mean the AI can do anything it wants. A business-ready AI agent needs a defined job, approved tools, permission limits, stop rules, review paths, and logs. The agent should know what it can answer, what it can suggest, what it can update, and when it must ask a human.
          - paragraph [ref=e131]: The difference is action. A chatbot may say, "You can book a consultation on this page." An AI agent may ask the visitor's need, check service fit, choose the right meeting type, look up availability, create a CRM record, draft a summary for the sales owner, and send the visitor to the right booking path.
          - paragraph [ref=e132]: That power creates risk. If an agent uses the wrong rules, writes the wrong CRM field, creates duplicate tickets, or gives a visitor a false expectation, the business has a real workflow problem. That is why agent projects need more design than website chatbot installs.
          - figure "Website AI should route conversations by complexity and risk, not by the most impressive demo." [ref=e133]:
            - img "Bot versus AI agent map showing intent, answer, action, review, FAQ, lead capture, CRM update, and human handoff" [ref=e135]
            - generic [ref=e136]: Website AI should route conversations by complexity and risk, not by the most impressive demo.
          - heading "When a Simple Website Bot Is Enough" [level=2] [ref=e137]
          - paragraph [ref=e138]: A simple bot is enough when the conversation is low-risk, public, repeatable, and easy to correct. The visitor needs help navigating information, not a system that makes decisions. In these cases, speed and clarity matter more than tool access.
          - paragraph [ref=e139]: The first good use case is FAQ support. If visitors repeatedly ask what you do, who you serve, how pricing works at a high level, what happens after a call, where you operate, or how to contact support, a website bot can answer from approved content and link to the right page.
          - paragraph [ref=e140]: The second use case is lead capture. A bot can ask who the visitor is, what they need, company size, timeline, budget signal, and preferred contact method. It can then send the information to a form or notify the team. If routing is simple, this may not require an agent.
          - paragraph [ref=e141]: The third use case is page guidance. Visitors often land on the wrong page. A bot can ask whether they need AI automation, AI consulting services, AI agent development, or custom AI solutions for businesses, then point them to the right service page.
          - paragraph [ref=e142]: The fourth use case is basic support intake. A bot can collect a description of the issue, ask for contact information, suggest help articles, and explain when the team will reply. If it does not need account lookup or ticket creation, a bot may be sufficient.
          - paragraph [ref=e143]: The fifth use case is content recommendation. If a visitor is researching a topic, the bot can point them to practical blog posts, checklists, or service pages. This is useful for early-stage buyers who are not ready to talk yet.
          - heading "When You Need an AI Agent Instead" [level=2] [ref=e144]
          - paragraph [ref=e145]: You need an AI agent when the website conversation must become a business workflow. That usually means the system needs data access, tool use, routing logic, decision rules, or human review. The visitor is no longer only asking a question. They are asking the business to do something.
          - paragraph [ref=e146]: Lead routing is a common example. A simple bot can collect a lead. An AI agent can classify the lead, enrich the company, check territory rules, score urgency, create or update the CRM record, assign an owner, and prepare a first follow-up draft. That requires more guardrails than a website FAQ bot.
          - paragraph [ref=e147]: Support is another example. A simple bot can suggest help content. An AI agent can check the customer's account, summarize the issue, classify severity, create a ticket, attach conversation context, and escalate urgent cases. That workflow needs clear stop rules and access controls.
          - paragraph [ref=e148]: Booking can also require an agent. Sending someone to a booking page is simple. Choosing the right appointment type, checking availability, verifying service area, matching the visitor to the right expert, and creating a CRM note is a workflow.
          - paragraph [ref=e149]: Pricing and quote conversations often require an agent or human handoff. If the price depends on scope, usage, contract terms, integrations, compliance, or custom work, the website AI should collect information and prepare a handoff. It should not invent a quote.
          - paragraph [ref=e150]: The moment the AI needs to update systems, read private data, trigger follow-up, or make a recommendation that affects the customer relationship, treat it as an agent workflow.
          - heading "12 Website AI Workflows to Consider First" [level=2] [ref=e151]
          - paragraph [ref=e152]: The right starting point depends on your site traffic, customer questions, sales process, support load, and risk tolerance. These 12 workflows show where a bot is enough, where an AI agent may be useful, and where human review should stay in control.
          - heading "1. FAQ and Product Fit Questions" [level=3] [ref=e153]
          - paragraph [ref=e154]: FAQ is the safest first workflow. The bot answers common questions from approved pages and gives visitors links to learn more. It can explain what the company does, what services exist, who the service is for, how the process works, and what the visitor should do next.
          - paragraph [ref=e155]: This is usually a bot workflow, not an agent workflow. The bot should cite or link to source pages and hand off when the visitor asks for a specific promise, exception, or custom recommendation.
          - heading "2. Lead Capture and Basic Qualification" [level=3] [ref=e156]
          - paragraph [ref=e157]: A website chatbot can ask qualification questions that make forms easier to complete. It can capture name, email, company, role, problem, timeline, service interest, and preferred contact method. This reduces friction when the visitor is unsure which form to use.
          - paragraph [ref=e158]: If the workflow only sends the lead to a team inbox, a bot may be enough. If it scores the lead, enriches the company, updates CRM fields, or routes to a specific owner, it should be designed as an AI agent workflow.
          - heading "3. Service Recommendation" [level=3] [ref=e159]
          - paragraph [ref=e160]: Many visitors do not know whether they need consulting, automation, agent development, or custom AI solutions. A bot can ask a few questions and recommend the right service page. This is helpful when the recommendation is based on simple, public rules.
          - paragraph [ref=e161]: Use an AI agent when the recommendation depends on internal context, budget, tool stack, compliance needs, data access, or workflow risk. The agent can prepare a recommendation for review rather than acting like a final consultant.
          - heading "4. Booking and Meeting Routing" [level=3] [ref=e162]
          - paragraph [ref=e163]: A simple bot can point visitors to a booking link or ask whether they want to schedule a call. That may be enough for small teams with one calendar and one meeting type.
          - paragraph [ref=e164]: Use an AI agent when booking depends on location, service fit, account owner, language, deal size, calendar rules, or support severity. The agent should only book approved meeting types and should log the reason for the booking.
          - heading "5. Support Triage" [level=3] [ref=e165]
          - paragraph [ref=e166]: Support triage starts with collecting the issue clearly. A bot can ask for the product, problem, urgency, account email, and screenshots. It can suggest public help articles and explain the next step.
          - paragraph [ref=e167]: An AI agent becomes useful when the support workflow needs account lookup, ticket creation, severity classification, internal routing, or escalation. That workflow needs guardrails because frustrated customers should not get trapped in a bad conversation.
          - heading "6. Order, Account, or Request Status" [level=3] [ref=e168]
          - paragraph [ref=e169]: Status questions are tempting to automate because they are repetitive. A website bot can explain where to check status or collect information for a callback. It should not reveal private information without verification.
          - paragraph [ref=e170]: An AI agent can answer status questions when it has approved access to reliable systems and identity checks. Start with low-risk status information before expanding to anything sensitive.
          - heading "7. Pricing, Scope, and Quote Intake" [level=3] [ref=e171]
          - paragraph [ref=e172]: A bot can explain public pricing ranges, packages, or how quotes are prepared. It can collect scope details and send them to the team. That is often enough for early-stage visitors.
          - paragraph [ref=e173]: Do not let a website AI invent custom pricing. If pricing depends on scope, integrations, volume, risk, contract terms, or approval, use the AI to prepare a quote intake packet and route it to a person.
          - heading "8. Technical Troubleshooting" [level=3] [ref=e174]
          - paragraph [ref=e175]: A bot can guide visitors through public troubleshooting steps and link to help content. This works when the steps are safe, general, and easy to verify.
          - paragraph [ref=e176]: An AI agent may be needed when troubleshooting requires logs, account configuration, product state, or internal tools. The agent should avoid destructive actions and escalate when confidence is low.
          - heading "9. Website Knowledge Search" [level=3] [ref=e177]
          - paragraph [ref=e178]: Many websites have useful pages that visitors cannot find. A bot can act as a guided search layer, summarizing relevant content and linking to the source. This is a strong low-risk use case.
          - paragraph [ref=e179]: The key guardrail is citation. The bot should show where the answer came from. If the answer cannot be grounded in approved website content, it should say that and offer a human handoff.
          - heading "10. CRM Updates and Lead Routing" [level=3] [ref=e180]
          - paragraph [ref=e181]: CRM updates are agent work. The AI may need to create a lead, update company fields, assign an owner, write a conversation summary, and trigger follow-up. That is valuable, but it creates data quality risk.
          - paragraph [ref=e182]: Start with suggested updates or limited fields. Record the source conversation, avoid duplicate records, and review routing logic before giving the agent broad write access.
          - heading "11. Human Handoff and Escalation" [level=3] [ref=e183]
          - paragraph [ref=e184]: Handoff is not a backup feature. It is a core part of safe website AI. The system should know when the visitor is upset, confused, high-value, urgent, or asking for something outside scope.
          - paragraph [ref=e185]: A good handoff includes the conversation summary, visitor details, requested outcome, urgency, attempted answers, and reason for escalation. The human should not have to ask the visitor to repeat everything.
          - heading "12. Conversation Quality Reporting" [level=3] [ref=e186]
          - paragraph [ref=e187]: Website AI should teach the business what visitors do not understand. Track unanswered questions, repeated confusion, failed handoffs, low-rated answers, missing content, lead quality, and conversion paths.
          - paragraph [ref=e188]: This reporting helps improve the website, not only the bot. If visitors keep asking the same question, the page may need clearer copy. If leads ask for a service you do not explain well, the service page may need repair.
