          - heading "Website AI Risks to Control" [level=2] [ref=e197]
          - paragraph [ref=e198]: The first risk is wrong answers. A website bot can damage trust if it invents policies, pricing, timelines, availability, or service promises. Every answer should come from approved content or a defined workflow. If the source is missing, the bot should say so.
          - paragraph [ref=e199]: The second risk is poor handoff. Visitors become frustrated when the AI keeps asking questions after it is clearly outside scope. Handoff rules should include explicit requests for a person, repeated failed answers, negative sentiment, urgent support, custom pricing, account-specific questions, and sensitive topics.
          - paragraph [ref=e200]: The third risk is privacy. Website conversations may include personal data, business details, account questions, health information, legal questions, financial information, or confidential project details. The system needs clear disclosure, retention rules, access controls, and data minimization.
          - paragraph [ref=e201]: For EU-facing sites, treat AI disclosure as a launch requirement. The EU AI Act Article 50 transparency obligations apply from August 2, 2026 and generally require people to be told when they are interacting directly with an AI system unless that is already obvious. Use a visible disclosure, a privacy link, and a clear human handoff instead of making the bot look like an unnamed staff member.
          - paragraph [ref=e202]: The fourth risk is tool misuse. An AI agent that can update CRM, create tickets, book meetings, or send emails needs strict permissions. Tool access should be narrow, logged, and tested with real edge cases before expansion.
          - paragraph [ref=e203]: The fifth risk is measuring the wrong thing. A high chat volume does not mean success. A long conversation does not mean value. Measure successful answers, qualified leads, handoff quality, visitor satisfaction, conversion movement, and the number of conversations that create useful next steps.
          - figure "Score website AI conversations by complexity, risk, and system access before choosing a bot, agent, or human handoff." [ref=e204]:
            - img "Website AI decision scorecard comparing FAQ answers, lead routing, and pricing exceptions by complexity, risk, system access, and best fit" [ref=e206]
            - generic [ref=e207]: Score website AI conversations by complexity, risk, and system access before choosing a bot, agent, or human handoff.
          - heading "Guardrails That Make Website AI Safe" [level=2] [ref=e208]
          - paragraph [ref=e209]: Start with approved knowledge. The bot should answer from reviewed website pages, service descriptions, support articles, policy pages, and approved sales language. Do not let it improvise business commitments.
          - paragraph [ref=e210]: Define scope by job. A FAQ bot answers questions. A lead bot collects details. A support triage bot gathers issue information. An AI agent books, routes, updates, or creates records. Mixing all of those jobs into one vague assistant makes testing harder.
          - paragraph [ref=e211]: Use source links and citations where possible. Visitors and staff should be able to verify why the bot answered a certain way. Source grounding also shows the business which website pages need improvement.
          - paragraph [ref=e212]: Keep human review for sensitive actions. Pricing exceptions, contract terms, refunds, legal or medical topics, complaints, account access, high-value leads, and system writes should be reviewed until the workflow is proven.
          - paragraph [ref=e213]: Log decisions and handoffs. A production workflow should record what the visitor asked, what the AI answered, what source was used, when the conversation escalated, what system action was suggested or taken, and who owns follow-up.
          - heading "A Practical 90-Day Website AI Implementation Plan" [level=2] [ref=e214]
          - paragraph [ref=e215]: In the first thirty days, map website conversation intent. Review contact forms, live chat logs, sales notes, support tickets, analytics, search queries, and common questions. Group conversations into low-risk answers, lead capture, support triage, booking, account-specific questions, custom pricing, and human escalation.
          - paragraph [ref=e216]: Choose the first workflow. Most businesses should start with FAQ plus lead capture or support triage. Define the knowledge sources, allowed answers, qualification questions, handoff rules, and metrics. Decide whether this first version is a bot, a bot plus forms, or a controlled AI agent.
          - paragraph [ref=e217]: In days thirty to sixty, build and test the pilot. Write approved answer rules, connect the knowledge base, design the conversation flow, add forms, test mobile behavior, define handoff messages, and review edge cases. If an AI agent is involved, connect only the minimum tools needed.
          - paragraph [ref=e218]: In days sixty to ninety, launch to a limited traffic path. Measure answer quality, lead quality, handoff completeness, failed questions, visitor satisfaction, and staff feedback. Expand only when the system answers reliably and the team trusts the handoff.
          - heading "The Minimum Useful Website AI Pilot" [level=3] [ref=e219]
          - paragraph [ref=e220]: The minimum useful pilot answers approved questions, captures visitor intent, collects contact details, recommends the right next page or form, and hands off cleanly when the request is outside scope. That is enough to prove value before building an agent with system access.
          - heading "What to Avoid in the First Build" [level=4] [ref=e221]
          - paragraph [ref=e222]: Avoid broad autonomous agents, automatic quotes, account-specific answers without verification, hidden CRM writes, unsupported claims, and chat experiences that trap visitors. Also avoid launching on every page before you understand which conversations the system handles well.
          - heading "Questions to Answer Before Launch" [level=5] [ref=e223]
          - list [ref=e224]:
            - listitem [ref=e225]: Which website conversation is the pilot responsible for?
            - listitem [ref=e226]: Which answers are approved, and which require human handoff?
            - listitem [ref=e227]: Which data can be collected, stored, or passed to the team?
            - listitem [ref=e228]: Which systems can the AI read or update?
            - listitem [ref=e229]: What counts as a successful conversation?
            - listitem [ref=e230]: How will failed answers, complaints, and handoff quality be reviewed?
          - heading "How to Measure Whether the Bot or Agent Is Working" [level=2] [ref=e231]
          - paragraph [ref=e232]: Measure website AI by outcome quality, not novelty. Useful metrics include successful answer rate, unsupported question rate, handoff rate, handoff completeness, lead capture rate, qualified lead rate, booking completion, support intake completeness, response speed, visitor rating, and staff acceptance.
          - paragraph [ref=e233]: Review conversation transcripts. Look for repeated confusion, weak answers, overlong conversations, failed escalation, missing source links, and visitor questions that reveal content gaps. The transcript review should improve both the AI and the website.
          - paragraph [ref=e234]: Track what happens after the chat. Did the lead convert? Did the support team receive enough detail? Did the visitor book the right meeting? Did the human owner understand the handoff? A chat that looks successful in the widget may still fail if the next team receives poor context.
          - paragraph [ref=e235]: If the bot performs well on simple answers but fails on workflow tasks, that is a signal to add an AI agent for a narrow path. If the agent creates too many corrections or bad handoffs, reduce scope and strengthen review.
          - 'heading "A Simple Decision Framework: Bot, Agent, or Human" [level=2] [ref=e236]'
          - paragraph [ref=e237]: "Use three filters before choosing the technology: complexity, risk, and system access. Complexity asks whether the visitor needs a simple answer or a multi-step workflow. Risk asks what happens if the answer is wrong. System access asks whether the AI needs to read or update private tools such as CRM, help desk, calendar, billing, project management, or account databases."
          - paragraph [ref=e238]: If complexity is low, risk is low, and system access is not needed, use a chatbot. A visitor asking what services you offer, where to find a case intake form, how to contact the team, or what happens after booking a call does not need an agent. The right answer is a clear bot with approved knowledge and good handoff.
          - paragraph [ref=e239]: If complexity is medium, risk is medium, and system access is limited, use a controlled AI agent. A visitor who needs lead routing, appointment type selection, ticket creation, CRM enrichment, or support triage needs more than a content answer. The agent can prepare and route work, but the workflow should still limit what it can change.
          - paragraph [ref=e240]: If complexity is high, risk is high, or the topic requires judgment, use human handoff with AI preparation. Custom pricing, legal questions, medical claims, complaints, refunds, contract exceptions, enterprise deal terms, and urgent account issues should not be fully automated from a public website chat. The AI can collect context and summarize the request, but a person should own the decision.
          - paragraph [ref=e241]: This framework also helps avoid overbuying. Many teams ask for an AI agent when they actually need better website content and a simple lead bot. Other teams install a chatbot when they really need a workflow connected to CRM, support, and booking. The decision should follow the job, not the label on the software.
          - paragraph [ref=e242]: The best production setup often combines all three paths. The bot handles public answers. The agent handles approved workflows. Humans handle exceptions. Visitors should not need to know which path is active. They should simply get a clear answer, a useful next step, or a clean handoff.
          - heading "When to Hire an AI Automation Agency" [level=2] [ref=e243]
          - paragraph [ref=e244]: You may not need an agency for a basic FAQ bot. Many website tools can handle simple answers, forms, and page recommendations. An AI automation agency becomes useful when the website AI needs workflow design, CRM integration, ticket creation, booking rules, custom knowledge retrieval, human review, reporting, or agent development.
          - paragraph [ref=e245]: A good agency should ask what job the website AI is responsible for before recommending tools. It should help decide where a bot is enough, where an AI agent is justified, what data can be accessed, what actions require approval, and how the rollout will be measured.
          - paragraph [ref=e246]: The agency should also protect the business from overbuilding. Sometimes the right first step is a better FAQ bot and a cleaner contact form. Sometimes the right step is an AI agent that connects chat to CRM and support. The correct answer depends on visitor intent, workflow complexity, and operational risk.
          - 'heading "Final Checklist: Choose the Right Website AI" [level=2] [ref=e247]'
          - list [ref=e248]:
            - listitem [ref=e249]: Use a simple bot for public, low-risk answers and basic lead capture.
            - listitem [ref=e250]: Use an AI agent when the workflow needs tools, CRM, tickets, booking, routing, or account context.
            - listitem [ref=e251]: Keep humans involved for pricing exceptions, complaints, sensitive topics, and high-impact decisions.
            - listitem [ref=e252]: Use approved knowledge, source links, handoff rules, and data retention controls.
            - listitem [ref=e253]: Measure answer quality, lead quality, handoff completeness, and staff trust.
            - listitem [ref=e254]: Expand from bot to agent only after the first workflow is reliable.
          - paragraph [ref=e255]: An AI chatbot for website visitors should make the site easier to use. It should answer simple questions, capture intent, and route people to the right next step. It should not pretend to be a full business process.
          - paragraph [ref=e256]: "An AI agent is the right choice when the website conversation needs to become controlled work: a CRM update, a support ticket, a booking, a quote intake, a handoff, or a follow-up workflow. Build that agent carefully, with clear permissions and review."
