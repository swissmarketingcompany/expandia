          - heading "AI Automation Agency vs Tool for London Companies" [level=2] [ref=e152]
          - paragraph [ref=e153]: A tool can be enough when the workflow is documented, low risk, and mostly contained in one system. An agency is a better fit when the workflow crosses teams, systems, approvals, sensitive data, or customer-facing communication.
          - paragraph [ref=e154]: For London, the agency route is most useful when the business needs discovery, workflow design, integrations, AI agent behavior, permission controls, documentation, training, and support in one delivery path. A good partner should also be willing to say when a workflow is not ready for automation yet.
