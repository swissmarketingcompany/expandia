          - generic [ref=e72]:
            - heading "Quick Take" [level=2] [ref=e73]
            - paragraph [ref=e74]: For London, the strongest first AI automation project is client intake, email triage, meeting follow-up, CRM updates, and reporting for professional services teams. It is specific enough to scope, frequent enough to matter, and controlled enough for a pilot with human review. The right partner should help you choose that first workflow before talking about models, agents, or complex architecture.
          - heading "The Real Buying Question in London" [level=2] [ref=e75]
          - paragraph [ref=e76]: "Most teams do not need another general AI explanation. They need to know where AI can remove repeated work without creating new operational risk. A useful London AI automation conversation starts with the handoff that slows the business down: an enquiry that waits in an inbox, a document that needs manual extraction, a CRM record that is never complete, or a customer request that moves between teams without context."
          - paragraph [ref=e77]: "That is why the first question should be practical: \"Which workflow can we improve in the next 30 to 60 days, using real examples from our business, with a named owner and a clear approval rule?\" If the partner cannot answer that question in plain business language, the project is likely to become a generic demo."
          - paragraph [ref=e78]: For London, the most relevant teams are often professional services, financial services, real estate, B2B agencies, operations-heavy SMEs. They tend to have enough volume for automation to matter, but enough client, customer, finance, or compliance sensitivity that the first build still needs human review and careful rollout.
          - generic [ref=e79]:
            - heading "What Current Market Data Says" [level=3] [ref=e80]
            - list [ref=e81]:
              - listitem [ref=e82]:
                - link "UK Department for Science, Innovation and Technology AI Adoption Research" [ref=e83] [cursor=pointer]:
                  - /url: https://www.gov.uk/government/publications/ai-adoption-research/ai-adoption-research
                - text: ": UK DSIT research reported that around 1 in 6 UK businesses, or 16%, currently use at least one AI technology, while London businesses were more likely to be using AI at 20% versus 16% overall."
          - heading "Why London Needs a Local AI Automation Angle" [level=2] [ref=e84]
          - paragraph [ref=e85]: London teams often have strong demand for AI but fragmented ownership across finance, sales, client service, compliance, and operations.
          - paragraph [ref=e86]: "The adoption data above does not mean every company in London should buy the same AI tool. It means enough competitors, suppliers, and clients are experimenting with AI that leadership needs a grounded answer: which operating workflow should we improve first, and what delivery model gives us a useful result without losing control?"
          - paragraph [ref=e87]: The answer depends on sector and operating maturity. In London, a practical first pilot usually lives close to customer communication, operational documents, CRM data, reporting, or cross-team coordination. Those are the places where repeated work is visible, the baseline can be measured, and quality can still be reviewed by a person before the workflow expands.
          - paragraph [ref=e88]: The rollout should also fit the way the team already works. If the current process runs through email, CRM, spreadsheets, shared drives, and weekly manager reviews, the pilot should improve those handoffs first. A useful automation feels like a cleaner operating rhythm, not a separate AI portal people have to remember to open every day.
          - 'figure "A practical workflow map: intake, context retrieval, first draft, human review, and system update." [ref=e89]':
            - img "AI workflow automation map from intake to human approval and system update" [ref=e90]
            - generic [ref=e91]: "A practical workflow map: intake, context retrieval, first draft, human review, and system update."
          - heading "What to Automate First in London" [level=2] [ref=e92]
          - paragraph [ref=e93]: The strongest first workflow for London is client intake, email triage, meeting follow-up, CRM updates, and reporting for professional services teams. It has the right mix of volume, business relevance, and manageable risk. The workflow is frequent enough to matter, but it can still be controlled with human review, source links, and limited permissions.
          - paragraph [ref=e94]: A good first project happens often, has a clear input and output, uses examples from previous work, has a named owner, and creates a measurable result such as faster response time, fewer missed follow-ups, cleaner CRM records, shorter document handling time, or more complete weekly reporting. Avoid broad ideas like "automate our whole company" until one real workflow is working.
          - generic [ref=e95]:
            - paragraph [ref=e96]: Practical example
            - 'heading "Example: a London professional services firm" [level=2] [ref=e97]'
            - paragraph [ref=e98]: A 45-person advisory firm with partners around the City, Shoreditch, and Canary Wharf receives referrals, web enquiries, and follow-up requests across partner inboxes. The slow part is not expertise. The slow part is turning every message into a clear brief, CRM record, owner assignment, and client-ready next step.
