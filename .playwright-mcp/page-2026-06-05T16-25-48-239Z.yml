            - generic [ref=e232]:
              - heading "Should we buy a tool or work with an AI automation agency?" [level=3] [ref=e233]
              - paragraph [ref=e234]: Buy a tool when the process is already clear, low risk, and mostly contained in one system. Work with an agency when the workflow crosses teams, approvals, sensitive data, customer communication, or systems that need careful integration.
