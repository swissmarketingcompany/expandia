          - heading "A 90-Day AI Automation Plan for London" [level=2] [ref=e179]
          - list [ref=e180]:
            - listitem [ref=e181]:
              - strong [ref=e182]: "Days 1 to 30:"
              - text: collect real workflow examples, name the owner, identify source systems, map edge cases, and rank use cases by value, risk, data readiness, and effort.
            - listitem [ref=e183]:
              - strong [ref=e184]: "Days 31 to 60:"
              - text: build the smallest useful pilot with controlled inputs, source retrieval or system connections, review states, and baseline measurement.
            - listitem [ref=e185]:
              - strong [ref=e186]: "Days 61 to 90:"
              - text: train users, collect corrections, document exceptions, compare results with the baseline, and decide whether to expand or tighten the workflow.
          - 'figure "Measure the pilot with operating metrics: response time, handling time, rework, backlog, adoption, and exception rate." [ref=e187]':
            - img "AI automation ROI dashboard showing time saved and rollout progress" [ref=e188]
            - generic [ref=e189]: "Measure the pilot with operating metrics: response time, handling time, rework, backlog, adoption, and exception rate."
          - heading "How to Measure Impact Without Inflating Claims" [level=2] [ref=e190]
          - paragraph [ref=e191]: "The most credible AI automation measurement is operational. Start with a baseline: request volume, task time, queue size, missing information, late follow-ups, rework, and current response time. After launch, compare the same metrics instead of relying on vague productivity claims."
          - paragraph [ref=e192]: Useful pilot measures include minutes saved per completed item, response time, first-draft quality, approval rate, exception rate, CRM completeness, document turnaround time, and user adoption. If the pilot saves time but creates more corrections, the workflow needs better context or narrower permissions before it expands.
          - heading "Buyer Checklist for London Teams" [level=2] [ref=e193]
          - paragraph [ref=e194]: Use this checklist before hiring an AI automation agency in London. It keeps the buying conversation concrete and reduces the risk of paying for a generic AI demo.
          - list [ref=e195]:
            - listitem [ref=e196]: Can the agency explain your London workflow in plain business language before proposing a tool?
            - listitem [ref=e197]: Does the agency ask for real examples, edge cases, approval rules, and owner names?
            - listitem [ref=e198]: Can it show how AI output will be reviewed, logged, corrected, and improved?
            - listitem [ref=e199]: Does it know when to use a workflow automation, an AI agent, a knowledge assistant, or a custom AI system?
            - listitem [ref=e200]: Does it define success as an operating metric, not only a model capability?
            - listitem [ref=e201]: Can it connect to the systems your team already uses without forcing a full rebuild?
            - listitem [ref=e202]: Does it include documentation, training, support, and a phased plan for the next decision?
          - heading "How to Use This Guide With Your Team" [level=2] [ref=e203]
          - paragraph [ref=e204]: Use this guide as a working agenda for a London AI automation discussion. Bring one workflow example, one recent customer or internal request, one source document, and one metric that shows the cost of the manual process.
          - paragraph [ref=e205]: If the workflow has enough volume and the team can provide real examples, Go Expandia can help map the process, design the automation, build the AI workflow or agent, train users, and support the system after launch. The aim is to remove repeated work while keeping quality, data handling, and accountability under control.
