              - generic [ref=e100]:
                - heading "Before automation" [level=3] [ref=e101]
                - list [ref=e102]:
                  - listitem [ref=e103]: A referral lands in a partner inbox and waits until the partner forwards it.
                  - listitem [ref=e104]: An assistant searches old proposals, LinkedIn notes, and CRM history by hand.
                  - listitem [ref=e105]: The first reply depends on who is available, so quality and speed vary.
                  - listitem [ref=e106]: CRM fields are updated after the fact, if they are updated at all.
              - generic [ref=e107]:
                - heading "After a controlled pilot" [level=3] [ref=e108]
                - list [ref=e109]:
                  - listitem [ref=e110]: AI classifies the enquiry, extracts company context, and drafts a one-page internal brief.
                  - listitem [ref=e111]: The workflow suggests an owner, creates a task, and flags missing information.
                  - listitem [ref=e112]: A human reviews the draft reply before anything goes to the prospect.
                  - listitem [ref=e113]: CRM fields, source links, and follow-up dates are updated as part of the same workflow.
